<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emloxa Ware | Security Gateway</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #050508;
            color: #ff3333;
            font-family: 'Consolas', 'Courier New', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        /* CRT Ekran Efekti (Scanlines) */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
        .terminal-container {
            width: 90%;
            max-width: 800px;
            background: #0a0a0f;
            border: 1px solid #330000;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.15);
            position: relative;
            z-index: 10;
            overflow: hidden;
        }
        .terminal-header {
            background: #111;
            padding: 10px 15px;
            border-bottom: 1px solid #330000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .terminal-title {
            color: #888;
            font-size: 0.9em;
            letter-spacing: 1px;
        }
        .window-controls {
            display: flex;
            gap: 8px;
        }
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .dot-red { background: #ff5f56; }
        .dot-yellow { background: #ffbd2e; }
        .dot-green { background: #27c93f; }
        .terminal-body {
            padding: 25px;
            height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .line {
            margin-bottom: 8px;
            font-size: 1.1em;
            text-shadow: 0 0 5px rgba(255, 51, 51, 0.5);
            opacity: 0;
            animation: fadeIn 0.1s forwards;
        }
        .success {
            color: #4af626;
            text-shadow: 0 0 5px rgba(74, 246, 38, 0.5);
        }
        .warning {
            color: #f6d326;
            text-shadow: 0 0 5px rgba(246, 211, 38, 0.5);
        }
        .danger {
            color: #ff3333;
            font-weight: bold;
        }
        .access-denied {
            font-size: 2.5em;
            text-align: center;
            margin-top: 30px;
            font-weight: bold;
            color: #ff0000;
            text-shadow: 0 0 20px #ff0000;
            animation: blink 1s infinite;
            display: none;
        }
        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2em;
            background-color: #ff3333;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="terminal-container">
        <div class="terminal-header">
            <div class="window-controls">
                <div class="dot dot-red"></div>
                <div class="dot dot-yellow"></div>
                <div class="dot dot-green"></div>
            </div>
            <div class="terminal-title">EMLOXA_SECURITY_CORE_v13.exe</div>
        </div>
        <div class="terminal-body" id="console">
            </div>
    </div>

    <script>
        const consoleDiv = document.getElementById('console');
        
        // Terminalde sırayla görünecek mesajlar ve gecikme süreleri (milisaniye)
        const sequence = [
            { text: "[*] INITIALIZING EMLOXA WARE SECURITY PROTOCOL...", class: "line", delay: 500 },
            { text: "[*] ESTABLISHING SECURE CONNECTION...", class: "line", delay: 800 },
            { text: "[+] CONNECTION ESTABLISHED.", class: "line success", delay: 400 },
            { text: "[*] ANALYZING INCOMING REQUEST HANDSHAKE...", class: "line", delay: 1200 },
            { text: "[!] WARNING: UNAUTHORIZED USER-AGENT DETECTED.", class: "line warning", delay: 1500 },
            { text: "[!] EXECUTOR FINGERPRINT... NOT FOUND.", class: "line warning", delay: 800 },
            { text: "[-] ERROR: BROWSER ENVIRONMENT DETECTED.", class: "line danger", delay: 500 },
            { text: "[*] INITIATING DEFENSE MECHANISM...", class: "line", delay: 1000 },
            { text: "[*] EXTRACTING CLIENT IP ADDRESS...", class: "line", delay: 900 },
            { text: "[+] IP LOGGED AND FORWARDED TO DATABASE.", class: "line success", delay: 600 },
            { text: "[-] TERMINATING CONNECTION...", class: "line danger", delay: 800 }
        ];

        let cursorElement = document.createElement('span');
        cursorElement.className = 'cursor';

        async function runTerminal() {
            for (let i = 0; i < sequence.length; i++) {
                await new Promise(resolve => setTimeout(resolve, sequence[i].delay));
                
                // Eğer ekranda imleç varsa, bir önceki satırdan kaldır
                if (consoleDiv.contains(cursorElement)) {
                    consoleDiv.removeChild(cursorElement);
                }

                // Yeni satırı oluştur
                const lineElement = document.createElement('div');
                lineElement.className = sequence[i].class;
                lineElement.innerText = sequence[i].text;
                
                // Satırı ekle ve imleci yanına koy
                consoleDiv.appendChild(lineElement);
                consoleDiv.appendChild(cursorElement);
                
                // Konsolu otomatik aşağı kaydır
                consoleDiv.scrollTop = consoleDiv.scrollHeight;
            }

            // Animasyon bittikten sonra "ACCESS DENIED" yazısını patlat
            await new Promise(resolve => setTimeout(resolve, 1000));
            if (consoleDiv.contains(cursorElement)) {
                consoleDiv.removeChild(cursorElement);
            }
            
            const deniedElement = document.createElement('div');
            deniedElement.className = 'access-denied';
            deniedElement.innerText = "ACCESS DENIED";
            consoleDiv.appendChild(deniedElement);
        }

        // Sayfa yüklendiğinde animasyonu başlat
        window.onload = runTerminal;
    </script>
</body>
</html>
